name: dotnet CI

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: ".NET SDK version to use e.g. '10.0.x'."
        required: false
        type: string
        default: "10.0.x"
      solution-file:
        description: "Solution or project file to build. Auto-discovered when omitted."
        required: false
        type: string
      private-nuget-registry:
        description: "Private NuGet registry URL. When set, configures auth for that registry."
        required: false
        type: string
    secrets:
      private-nuget-auth-token:
        description: "Auth token for private NuGet registry."
        required: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: "./Directory.Packages.props"

      - name: Configure private NuGet registry
        if: inputs.private-nuget-registry != ''
        run: |
          dotnet nuget add source "${{ inputs.private-nuget-registry }}" \
            -n private-registry \
            --username "${{ github.actor }}" \
            --password "${{ secrets.private-nuget-auth-token }}" \
            --store-password-in-clear-text

      - name: Print environment versions
        run: |
          DOTNET_V=$(dotnet --version)
          echo "::notice::dotnet version: $DOTNET_V"

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.solution-file }}

      - name: Build
        run: dotnet build ${{ inputs.solution-file }} --no-restore

      - name: Test
        run: dotnet test ${{ inputs.solution-file }} --no-build
