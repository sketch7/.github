name: dotnet CI

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: ".NET SDK version to use e.g. '10.0.x'."
        required: false
        type: string
        default: "10.0.x"
      solution-file:
        description: "Solution or project file to build. Auto-discovered when omitted."
        required: false
        type: string
      dotnet-cfg:
        description: "Build configuration e.g. 'Release', 'Debug'."
        required: false
        type: string
        default: "Release"
      project-path:
        description: "Path to the project or mono repo sub-folder e.g. './my-service'. Prepended to solution-file when resolving."
        required: false
        type: string
        default: "./"
      private-nuget-env-prefix:
        description: "Env var prefix for NuGet credentials (must match NuGet.Config %{PREFIX}_USERNAME% / %{PREFIX}_TOKEN%). When set, configures credentials."
        required: false
        type: string
    secrets:
      nuget-auth-token:
        description: "Auth token for NuGet source (also used for private NuGet restore credentials when private-nuget-env-prefix is set)."
        required: false
      private-nuget-username:
        description: "Username for private NuGet registry. Defaults to github.actor when omitted."
        required: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  NUGET_AUTH_TOKEN: ${{ secrets.nuget-auth-token || secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  packages: read
  checks: write
  actions: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: "./Directory.Packages.props"

      - name: Configure private NuGet credentials
        if: inputs.private-nuget-env-prefix != ''
        run: |
          echo "${{ inputs.private-nuget-env-prefix }}_USERNAME=${{ secrets.private-nuget-username || github.actor }}" >> $GITHUB_ENV
          echo "${{ inputs.private-nuget-env-prefix }}_TOKEN=$NUGET_AUTH_TOKEN" >> $GITHUB_ENV

      - name: Print environment versions
        run: |
          DOTNET_V=$(dotnet --version)
          echo "::notice::dotnet version: $DOTNET_V"

      - name: Resolve solution file
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const rawProjectPath = "${{ inputs.project-path }}";
            const projectPath = rawProjectPath.replace(/\/+$/, "") || ".";
            let sln = "${{ inputs.solution-file }}";

            if (!sln) {
              const pkgJsonPath = path.join(projectPath, "package.json");
              if (fs.existsSync(pkgJsonPath)) {
                try {
                  const pkg = JSON.parse(fs.readFileSync(pkgJsonPath, "utf8"));
                  sln = pkg.dotnetBuildSln || "";
                } catch { /* ignore malformed package.json */ }
              }
            }

            if (sln) {
              sln = sln.replace(/^\.\//,  ""); // strip leading ./
              if (projectPath !== "." && projectPath !== "" && !sln.startsWith(projectPath + "/")) {
                sln = `${projectPath}/${sln}`;
              }
            } else {
              sln = projectPath;
            }

            core.notice(`resolved solution-file: ${sln || "<empty>"}`);
            core.exportVariable("SLN", sln);

      - name: Restore dependencies
        run: dotnet restore "$SLN" /p:Configuration=${{ inputs.dotnet-cfg }}

      - name: Build
        run: dotnet build "$SLN" -c ${{ inputs.dotnet-cfg }} --no-restore

      - name: Test
        id: test
        run: dotnet test "$SLN" -c ${{ inputs.dotnet-cfg }} --no-build --logger trx --results-directory ./TestResults/

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() && steps.test.conclusion != '' && hashFiles('**/TestResults/*.trx') != '' }}
        with:
          name: .NET Tests
          path: "**/TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-error: true
