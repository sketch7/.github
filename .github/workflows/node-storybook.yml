name: node storybook

on:
  workflow_call:
    inputs:
      node-version-file:
        description: "File containing the Node version spec e.g. package.json, .nvmrc."
        required: false
        type: string
        default: "package.json"
      package-manager:
        description: "Package manager to use: 'npm' or 'pnpm'."
        required: false
        type: string
        default: npm
      private-npm-registry:
        description: "NPM private registry URL. When set, configures auth for that registry."
        required: false
        type: string
      private-npm-scope:
        description: "NPM private scope. Auto-resolved from package.json when omitted."
        required: false
        type: string
      lint-command:
        description: "Command to lint storybook. Set to empty string to skip."
        required: false
        type: string
        default: "npm run lint:storybook"
      build-command:
        description: "Command to build storybook."
        required: false
        type: string
        default: "npm run build:storybook"
      output-dir:
        description: "Directory containing the built storybook static output."
        required: false
        type: string
        default: "storybook/storybook-static"
      deploy:
        description: "Deploy the built storybook to GitHub Pages."
        required: false
        type: boolean
        default: false
    secrets:
      private-npm-auth-token:
        description: "Auth token for private NPM registry."
        required: false
    outputs:
      page_url:
        description: "URL of the deployed GitHub Pages site."
        value: ${{ jobs.deploy.outputs.page_url }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        if: inputs.package-manager == 'pnpm'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: ${{ inputs.package-manager }}

      - name: Configure private registry npm auth
        if: inputs.private-npm-registry != ''
        uses: sketch7/npm-auth-action@v1
        with:
          registry: ${{ inputs.private-npm-registry }}
          token: ${{ secrets.private-npm-auth-token }}
          scope: ${{ inputs.private-npm-scope }}

      - name: Print environment versions
        run: |
          NODE_V=$(node --version)
          NPM_V=$(npm -v)
          echo "::notice::node version: $NODE_V / npm version: $NPM_V"

      - name: Restore dependencies
        run: |
          if [[ "${{ inputs.package-manager }}" == "pnpm" ]]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Lint
        if: inputs.lint-command != ''
        run: ${{ inputs.lint-command }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Configure Pages
        if: inputs.deploy
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: inputs.deploy
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ inputs.output-dir }}

  deploy:
    name: Deploy
    needs: build
    if: inputs.deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
