name: dotnet publish

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: ".NET SDK version to use e.g. '10.0.x'."
        required: false
        type: string
        default: "10.0.x"
      source-url:
        description: "NuGet source URL passed to setup-dotnet for credential configuration."
        required: false
        type: string
        default: "https://api.nuget.org/v3/index.json"
      source-name:
        description: "NuGet source name (from NuGet.Config) used for 'dotnet nuget push -s'. Falls back to source-url when omitted."
        required: false
        type: string
      solution-file:
        description: "Solution or project file to build. Auto-discovered when omitted."
        required: false
        type: string
      project-path:
        description: "Path to the project or mono repo sub-folder e.g. './my-service'. Prepended to solution-file when resolving."
        required: false
        type: string
        default: "./"
      private-nuget-env-prefix:
        description: "Env var prefix for NuGet credentials (must match NuGet.Config %{PREFIX}_USERNAME% / %{PREFIX}_TOKEN%). When set, configures credentials."
        required: false
        type: string
      dotnet-cfg:
        description: "Build configuration e.g. 'Release', 'Debug'."
        required: false
        type: string
        default: "Release"
      preid-branches:
        description: "Branches to use for preid versioning e.g. 'main:rc,master:rc,develop:dev,vnext:next'. Uses version-builder-action default when omitted."
        required: false
        type: string
      force-preid:
        description: "Forces preid versioning even if branch condition is not satisfied."
        required: false
        type: boolean
        default: false
    secrets:
      nuget-auth-token:
        description: "Auth token for NuGet source (also used for private NuGet restore credentials when private-nuget-env-prefix is set)."
        required: false
      private-nuget-username:
        description: "Username for private NuGet registry. Defaults to github.actor when omitted."
        required: false
    outputs:
      version:
        description: "Full published version e.g. '1.5.6-rc.12'."
        value: ${{ jobs.publish.outputs.version }}
      baseVersion:
        description: "Base version without preid e.g. '1.5.6'."
        value: ${{ jobs.publish.outputs.baseVersion }}
      isPrerelease:
        description: "Whether the published version is a pre-release."
        value: ${{ jobs.publish.outputs.isPrerelease }}
      tag:
        description: "NPM dist-tag equivalent e.g. 'latest', 'rc', 'v1-lts'."
        value: ${{ jobs.publish.outputs.tag }}
      majorVersion:
        description: "Major version number e.g. '1'."
        value: ${{ jobs.publish.outputs.majorVersion }}

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  NUGET_AUTH_TOKEN: ${{ secrets.nuget-auth-token || secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for accurate commit counting in version-builder-action

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          source-url: ${{ inputs.source-url }}
          cache: true
          cache-dependency-path: "./Directory.Packages.props"

      - name: Configure private NuGet credentials
        if: inputs.private-nuget-env-prefix != ''
        run: |
          echo "${{ inputs.private-nuget-env-prefix }}_USERNAME=${{ secrets.private-nuget-username || github.actor }}" >> $GITHUB_ENV
          echo "${{ inputs.private-nuget-env-prefix }}_TOKEN=$NUGET_AUTH_TOKEN" >> $GITHUB_ENV

      - name: Print environment versions
        run: |
          DOTNET_V=$(dotnet --version)
          echo "::notice::dotnet version: $DOTNET_V"

      - name: Build version
        id: version-builder
        uses: sketch7/version-builder-action@v3
        with:
          preid-branches: ${{ inputs.preid-branches }}
          force-preid: ${{ inputs.force-preid }}

      - name: Set version envs
        run: |
          echo "VERSION=${{ steps.version-builder.outputs.version }}" >> $GITHUB_ENV
          echo "ASSEMBLY_VERSION=${{ steps.version-builder.outputs.fileVersion }}" >> $GITHUB_ENV

      - name: Resolve solution file
        run: |
          PROJECT_PATH="${{ inputs.project-path }}"
          PROJECT_PATH="${PROJECT_PATH%/}"
          SLN="${{ inputs.solution-file }}"
          if [[ -z "$SLN" && -f "${PROJECT_PATH}/package.json" ]]; then
            SLN="$(jq -r '.dotnetBuildSln // empty' "${PROJECT_PATH}/package.json" 2>/dev/null)"
          fi

          if [[ -n "$SLN" ]]; then
            SLN="${SLN#./}"  # strip leading ./
            if [[ "$PROJECT_PATH" != "." && "$PROJECT_PATH" != "" && "$SLN" != "$PROJECT_PATH/"* ]]; then
              SLN="${PROJECT_PATH}/${SLN}"
            fi
          else
            SLN="$PROJECT_PATH"
          fi

          echo "SLN=$SLN" >> "$GITHUB_ENV"
          echo "::notice::resolved solution-file: ${SLN:-<empty>}"

      - name: Restore dependencies
        run: dotnet restore "$SLN" /p:Configuration=${{ inputs.dotnet-cfg }}

      - name: Build
        run: |
          dotnet build "$SLN" \
            -c ${{ inputs.dotnet-cfg }} --no-restore \
            /p:Version=$VERSION /p:AssemblyVersion=$ASSEMBLY_VERSION

      - name: Pack
        run: |
          dotnet pack "$SLN" \
            -p:PackageVersion=$VERSION -p:AssemblyVersion=$ASSEMBLY_VERSION \
            -o ./artifacts -c ${{ inputs.dotnet-cfg }} \
            --include-symbols -p:SymbolPackageFormat=snupkg \
            --no-build --no-restore

      - name: Publish
        run: dotnet nuget push "./artifacts/*.nupkg" -k $NUGET_AUTH_TOKEN -s ${{ inputs.source-name || inputs.source-url }} --skip-duplicate

    outputs:
      version: ${{ steps.version-builder.outputs.version }}
      baseVersion: ${{ steps.version-builder.outputs.baseVersion }}
      isPrerelease: ${{ steps.version-builder.outputs.isPrerelease }}
      tag: ${{ steps.version-builder.outputs.tag }}
      majorVersion: ${{ steps.version-builder.outputs.majorVersion }}
