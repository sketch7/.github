# DEPRECATED: Use the split workflows tagged @node-libs-v2 instead:
#   - node-ci.yml          — lint, build, test
#   - node-publish.yml     — version, install, build, publish
#   - prepare-release.yml — create/update release PR on push to main
#   - create-release.yml   — git tag, floating tag, GitHub Release
# This file is kept for consumers still on @node-libs-v1.
name: node library build/publish

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version to use (defaults to 24)
        required: false
        type: string
        # default: "24"
      node-version-file:
        description: "File containing the version Spec of the version to use. Examples: package.json, .nvmrc, .node-version, .tool-versions."
        required: false
        type: string
        default: "package.json"
      package-manager:
        description: "Specify which package manager to use for repo e.g. 'npm', 'pnpm' (defaults: 'npm')"
        required: false
        type: string
        default: npm
      registry-url:
        description: NPM registry to use
        required: false
        type: string
        default: "https://registry.npmjs.org"
      private-npm-registry:
        description: NPM private registry to use.
        required: false
        type: string
      private-npm-scope:
        description: NPM private scope to use. When omitted, the scope is auto-resolved from the `name` field in `package.json` and `private-npm-registry` is used.
        required: false
        type: string
      publishable:
        description: Determines whether packages should be published.
        type: boolean
        default: ${{ contains(fromJSON('["develop", "master", "main", "vnext", "workflow"]'), github.ref_name) || endsWith(github.ref_name, '.x')  }}
        required: false
      force-preid:
        description: "Forces preid versioning even if branch not satisfied."
        type: boolean
        default: false
        required: false
      preid-branches:
        description: "Branches to be used for preid, as comma delimited to use for versioning e.g. 'main:rc,master:rc,develop:dev,vnext:next'. Uses version-builder-action default if not provided."
        type: string
        required: false
      publish-command:
        description: "Command to run to publish packages. (defaults to: `npm run release` NOTE: NOT `npm publish`)"
        type: string
        default: npm run release
        required: false
      version-replace:
        description: "Version to replace in the source code."
        type: string
        default: "0.0.0-PLACEHOLDER"
        required: false
      version-replace-glob:
        description: "Glob pattern to search for version placeholder."
        type: string
        default: "src/version.ts"
        required: false
    secrets:
      private-npm-auth-token:
        description: Auth token for NPM private registry (if applicable).
        required: false
    outputs:
      version:
        description: "Version of the package."
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate input
        run: |
          if [[ "${{ inputs.package-manager }}" != "npm" && "${{ inputs.package-manager }}" != "pnpm" ]]; then
            echo "Invalid package manager: '${{ inputs.package-manager}}'. Please use 'npm' or 'pnpm'."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for accurate commit counting version-builder-action

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        if: inputs.package-manager == 'pnpm'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          node-version-file: ${{ inputs.node-version-file }}
          registry-url: ${{ inputs.registry-url }}
          cache: ${{ inputs.package-manager }}

      - name: Configure private registry npm auth
        if: inputs.private-npm-registry != ''
        uses: sketch7/npm-auth-action@v1
        with:
          registry: ${{ inputs.private-npm-registry }}
          token: ${{ secrets.private-npm-auth-token }}
          scope: ${{ inputs.private-npm-scope }}

      - name: Print environment versions
        run: |
          NPM_V=$(npm -v)
          echo npm version':' $NPM_V
          NODE_V=$(node --version)
          echo node input version':' ${{ inputs.node-version }}
          echo "::notice::node version: $NODE_V" / npm version: $NPM_V

      - name: Build version
        id: version-builder
        if: inputs.publishable
        uses: sketch7/version-builder-action@v3
        with:
          preid-branches: ${{ inputs.preid-branches }}
          force-preid: ${{ inputs.force-preid }}
          # preid: "rc"

      - name: Set version envs
        if: inputs.publishable
        run: echo "VERSION=${{ steps.version-builder.outputs.version }}" >> $GITHUB_ENV

      - name: Set package version
        if: inputs.publishable
        run: npm version $VERSION --allow-same-version=true --git-tag-version=false

      - name: Restore dependencies
        run: |
          if [[ ${{ inputs.package-manager }} == "npm" ]]; then
            npm ci
          elif [[ ${{ inputs.package-manager }} == "pnpm" ]]; then
            pnpm i
          else
            echo "::error ::Package manager '${{ inputs.package-manager }}' not handled!"
            exit 1
          fi

      # todo: cache nx?
      # - name: Cache nx
      #   uses: actions/cache@v4
      #   with:
      #     path: .nx/cache
      #     key: ${{ runner.os }}-nx

      # - name: Derive appropriate SHAs for base and head for `nx affected` commands
      #   uses: nrwl/nx-set-shas@v4

      - name: Lint
        run: npm run lint --if-present

      - name: Replace version placeholder
        if: inputs.publishable && inputs.version-replace-glob != ''
        uses: richardrigutins/replace-in-files@v2
        with:
          files: ${{ inputs.version-replace-glob }}
          search-text: ${{ inputs.version-replace }}
          replacement-text: ${{ env.VERSION }}

      - name: Prerelease build
        if: inputs.publishable
        run: npm run pre-release-build --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

      - name: Publish
        run: ${{ inputs.publish-command }} -- --tag ${{ steps.version-builder.outputs.tag }}
        if: inputs.publishable

      # - name: Git tag
      #   if: inputs.publishable
      #   run: |
      #     git tag $VERSION
      #     git push origin $VERSION
      # - name: Pack
      #   if: inputs.publishable
      #   run: npm pack # note this might be tricky to support multiple packages

      # - name: 'Upload Artifact'
      #   uses: actions/upload-artifact@v3
      #   if: inputs.publishable
      #   with:
      #     name: packages
      #     retention-days: 1
      #     path:
      #       '*.tgz'
    outputs:
      version: ${{ steps.version-builder.outputs.version }}

