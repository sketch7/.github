name: dotnet package build/publish

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: dotnet version to use (defaults to 10.0.x)
        required: false
        type: string
        default: "10.0.x"
      publishable:
        description: Determines whether packages should be published to Nuget
        type: boolean
        default: ${{ contains(fromJSON('["develop", "master", "workflow"]'), github.ref_name) || endsWith(github.ref_name, '.x')  }}
        required: false
      force-preid:
        description: "Forces preid versioning even if branch not satisfied."
        type: boolean
        default: false
        required: false
      preid-branches:
        description: "Branches to be used for preid, as comma delimited to use for versioning e.g. 'main:rc,master:rc,develop:dev,vnext:next'. Uses version-builder-action default if not provided."
        type: string
        required: false
      source-url:
        description: Default nuget source url
        type: string
        default: "https://api.nuget.org/v3/index.json"
        required: false
      private-nuget-registry:
        description: Private NuGet registry to use (e.g. 'https://nuget.pkg.github.com/sketch7/index.json').
        required: false
        type: string
      solution-file:
        description: Solution file to build (optional - if not specified, will auto-detect)
        type: string
        required: false
    secrets:
      nuget-auth-token:
        description: Auth token for Nuget
        required: false
      private-nuget-auth-token:
        description: Auth token for private NuGet registry (if applicable).
        required: false
    outputs:
      version:
        description: "Version of the package"
        value: ${{ jobs.build.outputs.version }}

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print environment versions
        run: |
          NPM_V=$(npm -v)
          echo npm version':' $NPM_V
          DOTNET_CLI_V=$(dotnet --version)
          echo dotnet input version':' ${{ inputs.dotnet-version }}
          echo "::notice::dotnet cli version $DOTNET_CLI_V"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          source-url: ${{ inputs.source-url }}
          cache: true
          cache-dependency-path: "./Directory.Packages.props"

      - name: Configure private NuGet registry auth (for restore)
        if: inputs.private-nuget-registry != ''
        run: |
          echo "Adding private NuGet source: ${{ inputs.private-nuget-registry }}"
          dotnet nuget remove source private || true
          dotnet nuget add source \
            --name private \
            --username "${{ github.actor }}" \
            --password "${{ secrets.private-nuget-auth-token || secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            "${{ inputs.private-nuget-registry }}"

      - name: Configure default NuGet auth (if using GitHub Packages as source-url)
        if: contains(inputs.source-url, 'nuget.pkg.github.com')
        run: |
          echo "Adding GitHub Packages source for restore: ${{ inputs.source-url }}"
          dotnet nuget remove source github || true
          dotnet nuget add source \
            --name github \
            --username "${{ github.actor }}" \
            --password "${{ secrets.nuget-auth-token || secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            "${{ inputs.source-url }}"

      - name: Print environment versions
        run: |
          echo dotnet input version':' ${{ inputs.dotnet-version }}
          echo "::notice::dotnet cli version $(dotnet --version)"

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.solution-file }}

      - name: Build version
        id: version-builder
        if: inputs.publishable
        uses: sketch7/version-builder-action@v2
        with:
          preid-branches: ${{ inputs.preid-branches }}
          force-preid: ${{ inputs.force-preid }}

      - name: Set version envs
        if: inputs.publishable
        run: |
          echo "VERSION=${{ steps.version-builder.outputs.version }}" >> $GITHUB_ENV
          echo "ASSEMBLY_VERSION=${{ steps.version-builder.outputs.nonSemverVersion }}" >> $GITHUB_ENV

      - name: Build
        run: dotnet build ${{ inputs.solution-file }} -c Release --no-restore

      - name: Test
        run: npm test

      - name: Pack
        if: inputs.publishable
        run: dotnet pack ${{ inputs.solution-file }} -p:PackageVersion=$VERSION -p:AssemblyVersion=$ASSEMBLY_VERSION -o ./artifacts -c release --include-symbols -p:SymbolPackageFormat=snupkg --no-build --no-restore

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        if: inputs.publishable
        with:
          name: packages
          retention-days: 1
          path: artifacts
    outputs:
      version: ${{ steps.version-builder.outputs.version }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build.outputs.version }}
    if: inputs.publishable
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          source-url: ${{ inputs.source-url }}

      - name: Configure private NuGet registry auth (for push)
        if: inputs.private-nuget-registry != ''
        run: |
          dotnet nuget remove source private || true
          dotnet nuget add source \
            --name private \
            --username "${{ github.actor }}" \
            --password "${{ secrets.private-nuget-auth-token || secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            "${{ inputs.private-nuget-registry }}"

      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v7
        with:
          name: packages

      - name: Publish
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.nuget-auth-token || secrets.GITHUB_TOKEN }}
        run: dotnet nuget push "./artifacts/*.nupkg" -k $NUGET_AUTH_TOKEN -s ${{ inputs.source-url }} --skip-duplicate

      - name: Git tag
        run: |
          git tag $VERSION
          git push origin $VERSION
