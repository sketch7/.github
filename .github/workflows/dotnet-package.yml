name: dotnet package build/publish

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: dotnet version to use (defaults to 10.0.x)
        required: false
        type: string
        default: "10.0.x"
      publishable:
        description: Determines whether packages should be published to Nuget
        type: boolean
        default: ${{ contains(fromJSON('["develop", "master", "workflow"]'), github.ref_name) || endsWith(github.ref_name, '.x')  }}
        required: false
      force-preid:
        description: "Forces preid versioning even if branch not satisfied."
        type: boolean
        default: false
        required: false
      preid-branches:
        description: "Branches to be used for preid, as comma delimited to use for versioning e.g. 'main:rc,master:rc,develop:dev,vnext:next'. Uses version-builder-action default if not provided."
        type: string
        required: false
      source-url:
        description: Default nuget source url
        type: string
        default: "https://api.nuget.org/v3/index.json"
        required: false
      private-nuget-registry:
        description: Private NuGet registry to use (e.g. 'https://nuget.pkg.github.com/sketch7/index.json').
        required: false
        type: string
      solution-file:
        description: Solution file to build (optional - if not specified, will auto-detect)
        type: string
        required: false
    secrets:
      nuget-auth-token:
        description: Auth token for Nuget
        required: false
      private-nuget-auth-token:
        description: Auth token for private NuGet registry (if applicable).
        required: false
    outputs:
      version:
        description: "Version of the package"
        value: ${{ jobs.build.outputs.version }}

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Fallback chain for the token
  NUGET_AUTH_TOKEN: ${{ secrets.private-nuget-auth-token || secrets.nuget-auth-token || secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version-builder.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print environment versions
        run: |
          NPM_V=$(npm -v)
          echo npm version':' $NPM_V
          DOTNET_CLI_V=$(dotnet --version)
          echo dotnet input version':' ${{ inputs.dotnet-version }}
          echo "::notice::dotnet cli version $DOTNET_CLI_V"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          # We point this to the private registry so it generates the correct NuGet.config credentials
          source-url: ${{ inputs.private-nuget-registry || inputs.source-url }}
          cache: true
          cache-dependency-path: "./Directory.Packages.props"

      - name: Restore dependencies
        # The NUGET_AUTH_TOKEN env variable set at the top handles authentication here
        run: dotnet restore ${{ inputs.solution-file }}

      - name: Build version
        id: version-builder
        if: inputs.publishable
        uses: sketch7/version-builder-action@v2
        with:
          preid-branches: ${{ inputs.preid-branches }}
          force-preid: ${{ inputs.force-preid }}

      - name: Build
        run: |
          dotnet build ${{ inputs.solution-file }} \
            -c Release \
            --no-restore \
            -p:Version=${{ steps.version-builder.outputs.version }}

      - name: Test
        run: npm test || echo "No npm tests found"

      - name: Pack
        if: inputs.publishable
        run: |
          dotnet pack ${{ inputs.solution-file }} \
            -p:PackageVersion=${{ steps.version-builder.outputs.version }} \
            -p:AssemblyVersion=${{ steps.version-builder.outputs.nonSemverVersion }} \
            -o ./artifacts \
            -c Release \
            --include-symbols \
            -p:SymbolPackageFormat=snupkg \
            --no-build \
            --no-restore

      - name: "Upload Artifact"
        uses: actions/upload-artifact@v6
        if: inputs.publishable
        with:
          name: packages
          retention-days: 1
          path: artifacts

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.publishable
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          source-url: ${{ inputs.source-url }}

      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          name: packages
          path: ./artifacts

      - name: Publish
        # Use the specific token for the destination source
        run: dotnet nuget push "./artifacts/*.nupkg" -k ${{ secrets.nuget-auth-token || secrets.GITHUB_TOKEN }} -s ${{ inputs.source-url }} --skip-duplicate

      - name: Git tag
        run: |
          git tag ${{ needs.build.outputs.version }}
          git push origin ${{ needs.build.outputs.version }}
