name: Resolve .NET solution file
description: >
  Resolves the effective path for dotnet commands from project-path and
  solution-file inputs. Sets the SLN environment variable for subsequent steps
  and exposes it as the `sln` output.

inputs:
  project-path:
    description: "Path to the project or mono repo sub-folder e.g. './my-service'. Prepended to solution-file when resolving."
    required: false
    default: "./"
  solution-file:
    description: "Solution or project file. When omitted, auto-resolved from package.json#dotnetBuildSln."
    required: false
    default: ""

outputs:
  sln:
    description: "Resolved path passed to dotnet commands."
    value: ${{ steps.resolve.outputs.sln }}

runs:
  using: composite
  steps:
    - name: Resolve
      id: resolve
      shell: bash
      run: node "${{ github.action_path }}/index.js"
      env:
        INPUT_PROJECT_PATH: ${{ inputs.project-path }}
        INPUT_SOLUTION_FILE: ${{ inputs.solution-file }}
